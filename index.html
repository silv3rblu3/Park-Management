<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Utility Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header id="global-header">
        <div class="header-left">
            <button id="bento-trigger" aria-label="Open App Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3" y="3" width="4" height="4" rx="1"></rect>
                    <rect x="10" y="3" width="4" height="4" rx="1"></rect>
                    <rect x="17" y="3" width="4" height="4" rx="1"></rect>
                    <rect x="3" y="10" width="4" height="4" rx="1"></rect>
                    <rect x="10" y="10" width="4" height="4" rx="1"></rect>
                    <rect x="17" y="10" width="4" height="4" rx="1"></rect>
                    <rect x="3" y="17" width="4" height="4" rx="1"></rect>
                    <rect x="10" y="17" width="4" height="4" rx="1"></rect>
                    <rect x="17" y="17" width="4" height="4" rx="1"></rect>
                </svg>
            </button>
            <h2 id="app-title">Home Dashboard</h2>
        </div>

        <div class="header-center">
            <div id="global-search-container">
                <input type="text" id="global-search" placeholder="Search active app...">
            </div>
        </div>

        <div class="header-right">
            <button id="global-settings-trigger" title="Global Settings">⚙️</button>
        </div>
    </header>

    <nav id="bento-menu" class="hidden">
        <div class="bento-grid">
            <button class="bento-item" data-app="home">
                <span class="bento-icon">🏠</span>
                <span class="bento-label">Home</span>
            </button>
            <button class="bento-item" data-app="inventory">
                <span class="bento-icon">📦</span>
                <span class="bento-label">Inventory</span>
            </button>
            <button class="bento-item" data-app="fleet">
                <span class="bento-icon">🛻</span>
                <span class="bento-label">Fleet</span>
            </button>
            <button class="bento-item" data-app="winterization">
                <span class="bento-icon">❄️</span>
                <span class="bento-label">Winter Ops</span>
            </button>
            <button class="bento-item" data-app="firstAid">
                <span class="bento-icon">🩹</span>
                <span class="bento-label">First Aid</span>
            </button>
        </div>
    </nav>

    <main id="app-container">
        <div class="home-wrapper" style="padding: 2rem; text-align: center;">
            <h1>Welcome to the Hub</h1>
            <p style="color: var(--text-secondary);">Select an app from the grid menu to begin.</p>
        </div>
    </main>

    <dialog id="settings-modal">
        <div class="modal-header">
            <h3>System Settings & Themes</h3>
            <button id="close-settings-btn" class="icon-btn">❌</button>
        </div>
        <div class="modal-body">
            
            <section class="settings-section">
                <h4>Theme Manager</h4>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <select id="global-theme-select" class="app-select" style="flex: 2; margin-bottom: 0;"></select>
                    <button id="apply-theme-btn" class="btn-primary" style="flex: 1;">Set Active</button>
                </div>
                
                <div id="theme-editor-form" style="background: rgba(0,0,0,0.03); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h5 style="margin: 0; font-size: 1rem;">Theme Editor</h5>
                        <button id="new-theme-btn" class="btn-outline" style="padding: 4px 8px; font-size: 0.8rem;">+ New</button>
                    </div>
                    
                    <input type="hidden" id="theme-edit-id">
                    <input type="text" id="theme-edit-name" class="app-input" placeholder="Theme Name (e.g., Midnight Forest)">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 0.85rem; font-weight: bold;">
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Background</label><input type="color" id="theme-edit-bg"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Surface (Cards)</label><input type="color" id="theme-edit-surface"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Text Main</label><input type="color" id="theme-edit-text-main"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Text Muted</label><input type="color" id="theme-edit-text-muted"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Primary Button</label><input type="color" id="theme-edit-accent"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Button Hover</label><input type="color" id="theme-edit-accent-hover"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Border</label><input type="color" id="theme-edit-border"></div>
                        <div style="display: flex; justify-content: space-between; align-items: center;"><label>Danger/Error</label><input type="color" id="theme-edit-danger"></div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button id="save-theme-btn" class="btn-primary" style="flex: 2;">💾 Save Changes</button>
                        <button id="delete-theme-btn" class="btn-danger" style="flex: 1;">🗑️ Delete</button>
                    </div>
                </div>
            </section>
            <hr>
            
            <section class="settings-section">
                <h4>System Data (Master Backup)</h4>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px;">Export or import the entire database across all applications.</p>
                <button id="global-export-btn" class="btn-primary" style="width: 100%; margin-bottom: 10px;">⬇️ Export All Data JSON</button>
                
                <div class="import-wrapper">
                    <input type="file" id="global-import-file" accept=".json" style="display: none;">
                    <button id="global-import-btn" class="btn-danger" style="width: 100%;">⬆️ Import & Overwrite All Data</button>
                </div>
            </section>
        </div>
    </dialog>

    <div id="toast-container"></div>

    <script src="js/stateManager.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/core.js"></script>

    <script src="apps/inventory/template.js"></script>
    <script src="apps/inventory/app.js"></script>
    <script src="apps/fleet/template.js"></script>
    <script src="apps/fleet/app.js"></script>
    <script src="apps/winterization/template.js"></script>
    <script src="apps/winterization/app.js"></script>
    <script src="apps/first-aid/template.js"></script>
    <script src="apps/first-aid/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered! Offline mode active.'))
                .catch(err => console.error('Service Worker Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
